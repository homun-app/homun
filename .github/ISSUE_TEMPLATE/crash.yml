name: 💥 Crash report
description: Homun panicked or crashed. Use this after copying a crash report from the dashboard.
labels: ["crash", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a crash! Homun generates a **redacted crash report** every time it panics, stored in `~/.homun/crashes/`.

        **The easiest way to submit this**: go to the Homun web dashboard → Crashes page → find your crash → click "Open GitHub issue (pre-filled)". The dashboard will auto-fill this form with everything we need.

        If you arrived here manually, please paste the content of `~/.homun/crashes/YYYY-MM-DD_HH-MM-SS_<trace_id>.json` below.

  - type: textarea
    id: crash_json
    attributes:
      label: Crash report JSON
      description: |
        Paste the full content of the crash file. It includes version, OS, backtrace, last 200 log records, and trace ID.
        Homun **automatically redacts** PII and vault values before writing the file. If you see something that should be redacted but isn't, please flag it separately (that's a security issue).
      render: json
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What were you doing when it crashed?
      description: Short description of the user action that triggered the panic. This helps us reproduce.
      placeholder: |
        I was editing a workflow step when I clicked Save and the gateway process died.
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Once (isolated incident)
        - Intermittent (occasional, cannot reproduce reliably)
        - Frequent (multiple times per day)
        - Every time I try this specific action (reliable reproduction)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Homun version
      description: Output of `homun --version`. Should also be visible in the crash JSON.
      placeholder: "e.g., homun 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon / arm64)
        - macOS (Intel / x64)
        - Ubuntu / Debian (amd64)
        - Ubuntu / Debian (arm64)
        - Fedora / RHEL / Rocky Linux
        - Windows 11 + WSL2
        - Other (specify in Additional context)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, related errors from other sessions, anything else that might be relevant.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I checked that the crash report was generated by Homun's own panic handler (file is in `~/.homun/crashes/`)
          required: true
        - label: I reviewed the redacted JSON and it does not contain secrets or PII I do not want public
          required: true
        - label: I am willing to provide additional details if the maintainer asks
          required: true
